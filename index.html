<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>熊街道シューティング</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="gameWrap">
    <canvas id="gameCanvas" width="420" height="720"></canvas>

    <div id="startScreen" class="screen">
      <h1>熊街道<br>シューティング</h1>
      <p>サングラスのゴルゴを動かして熊を撃て！</p>
      <p class="small">Ver.2.0 サイレント版：ハイスコア・残機・コンティニュー・ステージ50裏ボス追加！</p>
      <button id="startBtn">ゲーム開始</button>
    </div>

    <div id="gameOverScreen" class="screen hidden">
      <h1>GAME OVER</h1>
      <p id="finalScore">SCORE 0</p>
      <button id="restartBtn">もう一回</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
